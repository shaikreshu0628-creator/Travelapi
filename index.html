<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Explorer Pro</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav>

        <h2>🌍 Travel Explorer Pro</h2>

        <div class="nav-links">

            <button onclick="showAll()">
                All Places
            </button>

            <button onclick="showFavorites()">
                ❤️ Favorites
            </button>

        </div>

    </nav>

    <!-- SEARCH SECTION -->
    <header>

        <input
            type="text"
            id="searchBox"
            placeholder="Search by Tourist Place, City or Country..."
        >

    </header>

    <!-- TOURIST PLACES -->
    <main>

        <div
            id="places"
            class="grid"
        ></div>

    </main>

    <!-- DETAILS MODAL -->

    <div
        id="placeModal"
        class="modal"
    >

        <div class="modal-content">

            <span
                class="close-btn"
                onclick="closeModal()"
            >
                &times;
            </span>

            <img
                id="modalImage"
                src=""
                alt=""
            >

            <h2 id="modalTitle"></h2>

            <p>
                <strong>Country:</strong>
                <span id="modalCountry"></span>
            </p>

            <p>
                <strong>City:</strong>
                <span id="modalCity"></span>
            </p>

            <p id="modalDescription"></p>

            <div class="actions">

                <a
                    id="modalWiki"
                    href="#"
                    target="_blank"
                >
                    <button class="read-btn">
                        📖 Read More
                    </button>
                </a>

                <a
                    id="modalMap"
                    href="#"
                    target="_blank"
                >
                    <button class="read-btn">
                        🗺️ Open Map
                    </button>
                </a>

            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <footer>

        <p>
            © 2025 Travel Explorer Pro | Discover the World's Best Tourist Destinations
        </p>

    </footer>

    <!-- JAVASCRIPT -->
    <script src="script.js"></script>

</body>
</html>
